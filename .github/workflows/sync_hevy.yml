name: SbS Workout Sync

on:
  schedule:
    - cron: '0 23 * * *'  # Runs daily at 11 PM UTC
  workflow_dispatch:      # Allows manual trigger
    inputs:
      action:
        description: 'Choose action to perform'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - next-week

jobs:
  run-sbs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: Perform Sync or Advance Week
      env:
        HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
      run: |
        if [ "${{ github.event.inputs.action }}" == "next-week" ]; then
          python sbs_logic.py --next-week
        else
          python sbs_logic.py
        fi

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add state.json README.md
        git commit -m "SbS Auto-Update: ${{ github.event.inputs.action || 'Daily Sync' }}" || echo "No changes to commit"
        git push
